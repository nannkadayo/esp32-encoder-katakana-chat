
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カタカナチャット WebSerial</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap');

:root {
  --bg:       #0d0f14;
  --panel:    #13161e;
  --border:   #1e2535;
  --accent:   #00e5ff;
  --accent2:  #ff6b35;
  --ok:       #39ff14;
  --warn:     #ffcc00;
  --text:     #c8d6e5;
  --dim:      #4a5568;
  --mono:     'Share Tech Mono', monospace;
  --jp:       'Noto Sans JP', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--jp);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 18px 12px 40px;
  gap: 14px;
}

/* ── ヘッダ ── */
header {
  width: 100%;
  max-width: 560px;
  display: flex;
  align-items: baseline;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
}
header h1 { font-family: var(--mono); font-size: 1.1rem; color: var(--accent); letter-spacing: 2px; }
header .sub { font-size: 0.7rem; color: var(--dim); }

/* ── 接続行 ── */
.connect-row {
  width: 100%;
  max-width: 560px;
  display: flex;
  align-items: center;
  gap: 8px;
}
#status-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
  transition: background .3s;
}
#status-dot.on { background: var(--ok); box-shadow: 0 0 7px var(--ok); }
#status-text { font-family: var(--mono); font-size: 0.78rem; color: var(--dim); flex: 1; }

.btn {
  font-family: var(--mono);
  font-size: 0.8rem;
  padding: 6px 14px;
  border: 1px solid currentColor;
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  letter-spacing: 1px;
  transition: background .15s, color .15s, opacity .15s;
}
.btn:disabled { opacity: .3; cursor: default; }
#btn-connect { color: var(--accent); }
#btn-connect:hover:not(:disabled) { background: var(--accent); color: var(--bg); }

/* ── OLED シミュレータ ── */
#oled {
  width: 256px; height: 128px;
  background: #000;
  border: 2px solid #1a1a1a;
  border-radius: 6px;
  box-shadow: 0 0 18px #00e5ff18, inset 0 0 24px #000b;
  overflow: hidden;
  position: relative;
  font-family: var(--mono);
  color: var(--accent);
  padding: 6px 8px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
#oled::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, #00002218 4px);
  pointer-events: none;
}
.ol { height: 14px; display: flex; align-items: center; font-size: 8.5px; white-space: nowrap; overflow: hidden; }
.ol-div { height: 1px; background: #00e5ff55; margin: 3px 0; }
.ol-dim { color: #006070; }
.ol-big { font-family: var(--jp); font-size: 13px; font-weight: 700; }
.ol-warn { color: var(--accent2); }

/* ── メインパネル群 ── */
.main { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 12px; }

/* ── ログ ── */
#log-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 10px 12px;
  min-height: 88px;
  max-height: 180px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.le { display: flex; gap: 7px; align-items: baseline; }
.le-pfx { font-family: var(--mono); font-size: 0.78rem; color: var(--dim); flex-shrink: 0; }
.le-pfx.s { color: var(--accent); }
.le-pfx.r { color: var(--accent2); }
.le-txt { font-family: var(--jp); font-size: 0.88rem; }
.le.sys .le-pfx { color: var(--dim); }
.le.sys .le-txt { font-family: var(--mono); font-size: 0.72rem; color: var(--dim); }

/* ── STEP パネル ── */
#step-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 12px;
}
.step-hdr {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.step-lbl { font-family: var(--mono); font-size: 0.68rem; color: var(--dim); letter-spacing: 2px; }
.step-dots { display: flex; gap: 5px; }
.sd { width: 26px; height: 3px; border-radius: 2px; background: var(--border); transition: background .2s; }
.sd.active { background: var(--accent); }
.sd.done   { background: var(--ok); }
.step-name { font-family: var(--mono); font-size: 0.72rem; color: var(--accent); margin-left: auto; }

/* ── キーグリッド ── */
.kgrid {
  display: grid;
  gap: 5px;
}
/* STEP1: 26文字を 7列×4行（最終行に空きが出るが整列する） */
.kgrid.step1 { grid-template-columns: repeat(7, 1fr); }
/* STEP2/3: 最大10個を均等 → 5列が最大 */
.kgrid.step2 { grid-template-columns: repeat(5, 1fr); }
.kgrid.step3 { grid-template-columns: repeat(5, 1fr); }

.key {
  aspect-ratio: 1;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: #0d1117;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  transition: border-color .1s, background .1s, transform .08s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}
.key:hover:not(.disabled)  { border-color: var(--accent); background: #0a1620; }
.key:active:not(.disabled) { transform: scale(.92); }
.key.selected { border-color: var(--accent); background: #001822; box-shadow: 0 0 7px #00e5ff33; }
.key.disabled { opacity: .22; pointer-events: none; }
.key .ka { font-family: var(--mono); font-size: 0.62rem; color: var(--dim); line-height: 1; }
.key .kk { font-family: var(--jp);   font-size: 0.72rem; color: var(--text); line-height: 1.1; }
.key.selected .ka { color: var(--accent); }
.key.selected .kk { color: #fff; }

/* ── バッファ表示 ── */
#buf-row {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
#buf-lbl { font-family: var(--mono); font-size: 0.72rem; color: var(--dim); flex-shrink: 0; }
#buf-txt { flex: 1; font-family: var(--jp); font-size: 1.25rem; letter-spacing: 2px; min-height: 32px; display: flex; align-items: center; }
#buf-cnt { font-family: var(--mono); font-size: 0.72rem; color: var(--dim); }

/* ── アクション行 ── */
.action-row { display: flex; gap: 8px; }
#btn-send {
  flex: 1;
  padding: 11px;
  font-family: var(--jp);
  font-weight: 700;
  font-size: .95rem;
  letter-spacing: 4px;
  color: var(--bg);
  background: var(--accent);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
}
#btn-send:hover:not(:disabled)  { opacity: .85; }
#btn-send:active:not(:disabled) { transform: scale(.98); }
#btn-send:disabled { background: var(--border); color: var(--dim); cursor: default; }
#btn-reset { color: var(--warn); padding: 11px 14px; }

/* ── 受信バナー ── */
#banner {
  position: fixed;
  top: 10px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--accent2);
  color: #fff;
  font-family: var(--jp);
  font-size: .88rem;
  padding: 9px 22px;
  border-radius: 40px;
  box-shadow: 0 4px 20px #0009;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
  z-index: 99;
  pointer-events: none;
}
#banner.show { transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>📡 KATAKANA CHAT</h1>
  <span class="sub">Web Serial Interface / Chrome・Edge 専用</span>
</header>

<!-- 接続 -->
<div class="connect-row">
  <div id="status-dot"></div>
  <span id="status-text">未接続</span>
  <button class="btn" id="btn-connect">CONNECT</button>
</div>

<!-- OLED シミュレータ -->
<div id="oled">
  <div class="ol"><span class="ol-dim">LOG:</span></div>
  <div class="ol" id="ol1"></div>
  <div class="ol" id="ol2"></div>
  <div class="ol-div"></div>
  <div class="ol"><span class="ol-dim">IN:&nbsp;</span><span id="ol-buf"></span></div>
  <div class="ol" style="justify-content:space-between">
    <span id="ol-cnt" class="ol-dim">0/10</span>
    <span id="ol-prev" class="ol-big"></span>
  </div>
</div>

<!-- メイン -->
<div class="main">

  <div id="log-box">
    <div class="le sys"><span class="le-pfx">—</span><span class="le-txt">接続待ち</span></div>
  </div>

  <div id="step-panel">
    <div class="step-hdr">
      <span class="step-lbl">STEP</span>
      <div class="step-dots">
        <div class="sd active" id="sd1"></div>
        <div class="sd"        id="sd2"></div>
        <div class="sd"        id="sd3"></div>
      </div>
      <span class="step-name" id="step-name">ALPHA</span>
    </div>
    <div id="key-area"></div>
  </div>

  <div id="buf-row">
    <span id="buf-lbl">IN:</span>
    <div id="buf-txt"></div>
    <span id="buf-cnt">0/10</span>
  </div>

  <div class="action-row">
    <button class="btn" id="btn-mode">JP あ〜ん</button>
    <button class="btn" id="btn-reset" disabled>リセット</button>
    <button id="btn-send" disabled>送　信</button>
  </div>

</div>

<div id="banner">📨 受信</div>

<script>
"use strict";

// =========================================================
// 変換テーブル（ESP32 と完全一致）
// =========================================================
const ALPHA = ['a','b','c','d','e','f','g','h','i','j',
               'k','l','m','n','o','p','q','r','s','t',
               'u','v','w','x','y','z'];

const EXT_LABEL = ['a','i','u','e','o','ya','yu','yo','small','n'];
const EXT_COUNT = [0,8,8,5,0,5,8,8,0,8,8,8,8,10,0,8,8,8,9,9,0,5,5,1,5,8];

const KANA = [
  ['ア','イ','ウ','エ','オ',null,null,null,null,null],
  ['バ','ビ','ブ','ベ','ボ','ビャ','ビュ','ビョ',null,null],
  ['カ','キ','ク','ケ','コ','キャ','キュ','キョ',null,null],
  ['ダ','ヂ','ヅ','デ','ド',null,null,null,null,null],
  ['ア','イ','ウ','エ','オ',null,null,null,null,null],
  ['ファ','フィ','フ','フェ','フォ',null,null,null,null,null],
  ['ガ','ギ','グ','ゲ','ゴ','ギャ','ギュ','ギョ',null,null],
  ['ハ','ヒ','フ','ヘ','ホ','ヒャ','ヒュ','ヒョ',null,null],
  ['ア','イ','ウ','エ','オ',null,null,null,null,null],
  ['ジャ','ジ','ジュ','ジェ','ジョ','ジャ','ジュ','ジョ',null,null],
  ['カ','キ','ク','ケ','コ','キャ','キュ','キョ',null,null],
  ['ラ','リ','ル','レ','ロ','リャ','リュ','リョ',null,null],
  ['マ','ミ','ム','メ','モ','ミャ','ミュ','ミョ',null,null],
  ['ナ','ニ','ヌ','ネ','ノ','ニャ','ニュ','ニョ',null,'ン'],
  ['ア','イ','ウ','エ','オ',null,null,null,null,null],
  ['パ','ピ','プ','ペ','ポ','ピャ','ピュ','ピョ',null,null],
  ['カ','キ','ク','ケ','コ','キャ','キュ','キョ',null,null],
  ['ラ','リ','ル','レ','ロ','リャ','リュ','リョ',null,null],
  ['サ','シ','ス','セ','ソ','シャ','シュ','ショ',null,null],
  ['タ','チ','ツ','テ','ト','チャ','チュ','チョ','ッ',null],
  ['ア','イ','ウ','エ','オ',null,null,null,null,null],
  ['ヴァ','ヴィ','ヴ','ヴェ','ヴォ',null,null,null,null,null],
  ['ワ','ウィ','ウ','ウェ','ヲ',null,null,null,null,null],
  [null,null,null,null,null,null,null,null,'→sm',null],
  ['ヤ','イ','ユ','イェ','ヨ',null,null,null,null,null],
  ['ザ','ジ','ズ','ゼ','ゾ','ジャ','ジュ','ジョ',null,null],
];

const SMALL     = ['ァ','ィ','ゥ','ェ','ォ'];
const SMALL_LBL = ['a','i','u','e','o'];

// ESP32 と同一順序: a=0,i=8,u=20,e=4,o=14
const VOWEL_IDX = [0,8,20,4,14];
function isVowel(i){ return VOWEL_IDX.includes(i); }
function vowelKana(i){ const m={0:0,8:1,20:2,4:3,14:4}; return KANA[i][m[i]]; }

// =========================================================
// QWERTY 定義
// =========================================================
// STEP1 / STEP2 / STEP3 共通の3行構造
// 各セルは { label, role } で role は以下:
//   STEP1: 'alpha'  → ALPHA文字  (labelがアルファベット)
//   STEP2: 'ext'    → EXT_INDEX  (label='a'/'i'/... or 'ya'/'yu'/'yo'/'sm'/'n')
//          'y_gate' → yキー（押すとSTEP3へ進む）
//          'sm_gate'→ smキー（押すとSTEP3小文字モードへ）
//   STEP3: 'final'  → SMALL index (label='a'/'u'/'o' のみ有効)

// STEP2 の各キーに「どのextIdxに対応するか」を定義
//   extIdx=null → その行では使えないキー（暗く表示）
//   extIdx='Y'  → yキー（STEP3=拗音モードへ進む）
//   extIdx='SM' → smキー（STEP3=小文字モードへ進む）
const QWERTY_STEP2 = [
  // row1: q  w  e  r  t  [ya/Y]  u  i  o  p
  [ {l:'q',e:null}, {l:'w',e:null}, {l:'e',e:3},  {l:'r',e:null}, {l:'t',e:null},
    {l:'y→',e:'Y'}, {l:'u',e:2},    {l:'i',e:1},  {l:'o',e:4},    {l:'p',e:null} ],
  // row2: a  s  d  f  g  h  j  k  l  [n]
  [ {l:'a',e:0},    {l:'s',e:null}, {l:'d',e:null},{l:'f',e:null}, {l:'g',e:null},
    {l:'h',e:null}, {l:'j',e:null}, {l:'k',e:null},{l:'l',e:null}, {l:'n',e:9} ],
  // row3: z  x  c  v  b  [sm]  m
  [ {l:'z',e:null}, {l:'x',e:null}, {l:'c',e:null},{l:'v',e:null}, {l:'b',e:null},
    {l:'sm→',e:'SM'},{l:'m',e:null} ],
];

// STEP3拗音: y→a=ya(5), y→u=yu(6), y→o=yo(7)
// STEP3小文字: sm→a=ァ(0), sm→i=ィ(1), sm→u=ゥ(2), sm→e=ェ(3), sm→o=ォ(4)
const QWERTY_STEP3 = [
  [ {l:'q',e:null},{l:'w',e:null},{l:'e',e:'e'},{l:'r',e:null},{l:'t',e:null},
    {l:'y',e:null},{l:'u',e:'u'}, {l:'i',e:'i'},{l:'o',e:'o'}, {l:'p',e:null} ],
  [ {l:'a',e:'a'}, {l:'s',e:null},{l:'d',e:null},{l:'f',e:null},{l:'g',e:null},
    {l:'h',e:null},{l:'j',e:null},{l:'k',e:null},{l:'l',e:null},{l:'n',e:null} ],
  [ {l:'z',e:null},{l:'x',e:null},{l:'c',e:null},{l:'v',e:null},{l:'b',e:null},
    {l:'m',e:null} ],
];

// STEP3 でどの母音キーが有効かはモードによる
// mode='ya': a/u/o のみ有効 → ya/yu/yo
// mode='sm': a/i/u/e/o 全部有効 → ァィゥェォ
let step3mode = 'ya'; // 'ya' or 'sm'

// =========================================================
// 入力状態
// =========================================================
const STEP = Object.freeze({ALPHA:0, EXT:1, FINAL:2});
let step      = STEP.ALPHA;
let alphaIdx  = 0;
let extIdx    = 0;
let finalIdx  = 0;
let buffer    = '';
let charCount = 0;

// =========================================================
// シリアル
// =========================================================
let port    = null;
let writer  = null;
let reader  = null;
let lineBuf = '';

async function serialSendLine(str){
  if(!writer) return;
  await writer.write(new TextEncoder().encode(str + '\n'));
}

// =========================================================
// DOM
// =========================================================
const $connect  = document.getElementById('btn-connect');
const $send     = document.getElementById('btn-send');
const $reset    = document.getElementById('btn-reset');
const $sDot     = document.getElementById('status-dot');
const $sTxt     = document.getElementById('status-text');
const $logBox   = document.getElementById('log-box');
const $keyArea  = document.getElementById('key-area');
const $bufTxt   = document.getElementById('buf-txt');
const $bufCnt   = document.getElementById('buf-cnt');
const $banner   = document.getElementById('banner');
const $ol1      = document.getElementById('ol1');
const $ol2      = document.getElementById('ol2');
const $olBuf    = document.getElementById('ol-buf');
const $olCnt    = document.getElementById('ol-cnt');
const $olPrev   = document.getElementById('ol-prev');
const $stepName = document.getElementById('step-name');

function setText(el, str){ el.textContent = str; }

// =========================================================
// ログ
// =========================================================
let oledLines = [];
function addLog(cls, pfx, txt){
  const div = document.createElement('div');
  div.className = 'le ' + cls;
  const sp1 = document.createElement('span');
  sp1.className = 'le-pfx ' + (cls==='send'?'s':cls==='recv'?'r':'');
  setText(sp1, pfx);
  const sp2 = document.createElement('span');
  sp2.className = 'le-txt';
  setText(sp2, txt);
  div.appendChild(sp1); div.appendChild(sp2);
  $logBox.appendChild(div);
  $logBox.scrollTop = $logBox.scrollHeight;
  if(cls !== 'sys'){
    oledLines.push((cls==='send'?'<':'>') + txt);
    if(oledLines.length > 2) oledLines.shift();
    setText($ol1, oledLines[0] || '');
    setText($ol2, oledLines[1] || '');
  }
}

let bannerTimer;
function showBanner(txt){
  setText($banner, '📨 ' + txt);
  $banner.classList.add('show');
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(()=> $banner.classList.remove('show'), 2800);
}

// =========================================================
// UI 更新
// =========================================================
function updateUI(){
  setText($bufTxt, buffer);
  setText($bufCnt, charCount + '/10');
  setText($olBuf, buffer);
  setText($olCnt, charCount + '/10');

  let prev = '';
  if     (step===STEP.ALPHA) prev = ALPHA[alphaIdx];
  else if(step===STEP.EXT)   prev = KANA[alphaIdx][extIdx] || '?';
  else                        prev = SMALL[finalIdx];
  setText($olPrev, '[' + prev + ']');

  const stepNames = ['STEP1','STEP2','STEP3'];
  setText($stepName, stepNames[step]);
  for(let i=1;i<=3;i++){
    const d = document.getElementById('sd'+i);
    d.className = 'sd' + (i-1<step?' done': i-1===step?' active':'');
  }

  const connected = !!writer;
  $send.disabled  = charCount === 0 || !connected;
  $reset.disabled = charCount === 0 || !connected;

  renderKeys();
}

// =========================================================
// キー描画（QWERTY 3ステップ）
// =========================================================
function renderKeys(){
  $keyArea.innerHTML = '';
  if     (step === STEP.ALPHA) renderSTEP1();
  else if(step === STEP.EXT)   renderSTEP2();
  else                          renderSTEP3();
}

// ── STEP1: 子音/母音選択 ──
function renderSTEP1(){
  const ROWS = [
    {keys:['q','w','e','r','t','y','u','i','o','p'], pad:0},
    {keys:['a','s','d','f','g','h','j','k','l'],     pad:0.5},
    {keys:['z','x','c','v','b','n','m'],             pad:1.25},
  ];
  ROWS.forEach(row => {
    const rowDiv = mkRow();
    if(row.pad){ rowDiv.appendChild(mkSpacer(row.pad)); }
    row.keys.forEach(ch => {
      const i    = ALPHA.indexOf(ch);
      const cnt  = EXT_COUNT[i];
      const kana = isVowel(i) ? vowelKana(i) : (cnt>0 ? KANA[i][0] : null);
      const avail = isVowel(i) || cnt > 0;
      const k = mkKey(ch, kana || '', i===alphaIdx, !avail, avail ? ()=>clickS1(i) : null);
      k.style.flex = '1';
      if(!avail) k.style.opacity = '0.18';
      rowDiv.appendChild(k);
    });
    if(row.pad){ rowDiv.appendChild(mkSpacer(row.pad)); }
    $keyArea.appendChild(rowDiv);
  });
}

// ── STEP2: 母音 / y→STEP3 / sm→STEP3 ──
function renderSTEP2(){
  QWERTY_STEP2.forEach(row => {
    const rowDiv = mkRow();
    row.forEach(cell => {
      const ei  = cell.e;
      const cnt = EXT_COUNT[alphaIdx];

      let avail = false;
      let kana  = '';
      let onClick = null;

      if(ei === 'Y'){
        // y→ ゲート: 拗音が1つでも存在する行なら有効
        avail = cnt > 5 && (KANA[alphaIdx][5]||KANA[alphaIdx][6]||KANA[alphaIdx][7]);
        kana  = avail ? 'y→' : '';
        if(avail) onClick = ()=>{ step3mode='ya'; step=STEP.FINAL; updateUI(); };
      } else if(ei === 'SM'){
        // sm→ ゲート: alphaIdx===23('x') の場合のみ
        avail = alphaIdx === 23;
        kana  = avail ? 'sm→' : '';
        if(avail) onClick = ()=>{ step3mode='sm'; step=STEP.FINAL; updateUI(); };
      } else if(ei !== null){
        avail = ei < cnt && KANA[alphaIdx][ei] !== null;
        kana  = avail ? KANA[alphaIdx][ei] : '';
        if(avail) onClick = ()=>clickS2(ei);
      }

      const k = mkKey(cell.l, kana, false, false, onClick);
      k.style.flex = '1';
      if(!avail) k.style.opacity = '0.18';
      rowDiv.appendChild(k);
    });
    $keyArea.appendChild(rowDiv);
  });

  // STEP2 に「← 戻る」ボタン
  appendBackBtn(()=>{ step=STEP.ALPHA; alphaIdx=0; updateUI(); });
}

// ── STEP3: 拗音母音 or 小文字 ──
function renderSTEP3(){
  // ya モード: a=ya(5) / u=yu(6) / o=yo(7)
  // sm モード: a=ァ(0) / i=ィ(1) / u=ゥ(2) / e=ェ(3) / o=ォ(4)
  const yMap  = {a:5, u:6, o:7};
  const smMap = {a:0, i:1, u:2, e:3, o:4};
  const activeMap = step3mode==='ya' ? yMap : smMap;

  QWERTY_STEP3.forEach(row => {
    const rowDiv = mkRow();
    row.forEach(cell => {
      const vowelKey = cell.e; // 'a','i','u','e','o' or null
      const avail    = vowelKey !== null && vowelKey in activeMap;

      let kana    = '';
      let onClick = null;
      if(avail){
        if(step3mode === 'ya'){
          kana    = KANA[alphaIdx][activeMap[vowelKey]];
          onClick = ()=>clickS3ya(activeMap[vowelKey]);
        } else {
          kana    = SMALL[activeMap[vowelKey]];
          onClick = ()=>clickS3sm(activeMap[vowelKey]);
        }
      }

      const k = mkKey(cell.l, kana || '', false, false, onClick);
      k.style.flex = '1';
      if(!avail) k.style.opacity = '0.18';
      rowDiv.appendChild(k);
    });
    $keyArea.appendChild(rowDiv);
  });

  appendBackBtn(()=>{ step=STEP.EXT; updateUI(); });
}

// =========================================================
// クリックハンドラ
// =========================================================
async function clickS1(i){
  if(!writer) return;
  alphaIdx = i;
  await serialSendLine(ALPHA[i]);

  if(isVowel(i)){
    // 母音: 即確定
    await serialSendLine('E');
    step=STEP.ALPHA; alphaIdx=0;
  } else {
    // 子音: STEP2へ（ESP側でもEでSTEP2へ移行）
    await serialSendLine('E');
    step=STEP.EXT; extIdx=0;
  }
  updateUI();
}

async function clickS2(ei){
  if(!writer) return;
  extIdx = ei;
  await serialSendLine('X' + ei);
  await serialSendLine('E');
  step=STEP.ALPHA; alphaIdx=0; extIdx=0;
  updateUI();
}

async function clickS3ya(ei){
  // 拗音: X{ei} + E
  if(!writer) return;
  await serialSendLine('X' + ei);
  await serialSendLine('E');
  step=STEP.ALPHA; alphaIdx=0; extIdx=0; finalIdx=0;
  updateUI();
}

async function clickS3sm(fi){
  // 小文字: X8 + E → F{fi} + E
  if(!writer) return;
  await serialSendLine('X8');
  await serialSendLine('E');
  await serialSendLine('F' + fi);
  await serialSendLine('E');
  step=STEP.ALPHA; alphaIdx=0; extIdx=0; finalIdx=0;
  updateUI();
}

// =========================================================
// DOM ヘルパー
// =========================================================
function mkRow(){
  const d = document.createElement('div');
  d.style.cssText = 'display:flex;gap:5px;margin-bottom:5px;';
  return d;
}
function mkSpacer(flex){
  const d = document.createElement('div');
  d.style.cssText = `flex:${flex};min-width:0;`;
  return d;
}
function mkKey(top, mid, selected, disabled, onClick){
  const k = document.createElement('div');
  k.className = 'key' + (selected?' selected':'') + (disabled?' disabled':'');
  const t = document.createElement('span'); t.className='ka'; setText(t, top||'');
  const m = document.createElement('span'); m.className='kk'; setText(m, mid||'');
  k.appendChild(t); k.appendChild(m);
  if(!disabled && onClick) k.addEventListener('click', onClick);
  return k;
}
function appendBackBtn(onBack){
  const wrap = document.createElement('div');
  wrap.style.cssText = 'margin-top:4px;';
  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.style.cssText = 'color:var(--dim);font-size:.72rem;padding:4px 12px;width:100%;';
  setText(btn, '← 戻る');
  btn.addEventListener('click', onBack);
  wrap.appendChild(btn);
  $keyArea.appendChild(wrap);
}

// =========================================================
// 送信 / リセット
// =========================================================
$send.addEventListener('click', async ()=>{
  if(!writer) return;
  await serialSendLine('S');
});
$reset.addEventListener('click', async ()=>{
  if(!writer) return;
  await serialSendLine('R');
  step=STEP.ALPHA; alphaIdx=0; extIdx=0; finalIdx=0;
  buffer=''; charCount=0;
  updateUI();
});

// =========================================================
// ESP32 応答パーサ
// =========================================================
function parseLine(line){
  line = line.trim();
  if(!line) return;
  if(line==='READY'){ addLog('sys','—','ESP32 接続完了 ✓'); return; }
  if(line==='OK') return;
  if(line==='INVALID'){ addLog('sys','⚠','無効な操作'); return; }

  if(line.startsWith('STATE:')){
    const parts = line.slice(6).split('|');
    if(parts.length >= 6){
      step      = parseInt(parts[0]);
      alphaIdx  = parseInt(parts[1]);
      extIdx    = parseInt(parts[2]);
      finalIdx  = parseInt(parts[3]);
      buffer    = parts[4];
      charCount = parseInt(parts[5]);
      updateUI();
    }
    return;
  }
  if(line.startsWith('MSG:<')){ const t=line.slice(5); addLog('send','<',t); buffer=''; charCount=0; step=STEP.ALPHA; alphaIdx=0; extIdx=0; finalIdx=0; updateUI(); return; }
  if(line.startsWith('MSG:>')){ addLog('recv','>',line.slice(5)); showBanner(line.slice(5)); return; }
  if(line.startsWith('My MAC:')){ addLog('sys','—','MAC: '+line.slice(7).trim()); return; }
  addLog('sys','—',line);
}

// =========================================================
// シリアル読み取りループ
// =========================================================
async function readLoop(){
  reader = port.readable.pipeThrough(new TextDecoderStream()).getReader();
  lineBuf = '';
  try {
    while(true){
      const {value, done} = await reader.read();
      if(done) break;
      lineBuf += value;
      let nl;
      while((nl = lineBuf.indexOf('\n')) !== -1){
        parseLine(lineBuf.slice(0, nl));
        lineBuf = lineBuf.slice(nl+1);
      }
    }
  } catch(e){ addLog('sys','⚠','受信エラー: '+e.message); }
}

// =========================================================
// 接続 / 切断
// =========================================================
$connect.addEventListener('click', async ()=>{
  if(port){
    try {
      if(reader){ await reader.cancel(); reader=null; }
      if(writer){ writer.releaseLock(); writer=null; }
      try{ await port.close(); }catch(_){}
    } catch(e){}
    port=null;
    $sDot.className='status-dot';
    setText($sTxt,'切断しました');
    $connect.textContent='CONNECT';
    $send.disabled=true; $reset.disabled=true;
    return;
  }
  if(!('serial' in navigator)){
    addLog('sys','⚠','Chrome/Edge が必要です');
    return;
  }
  try {
    port = await navigator.serial.requestPort();
    await port.open({baudRate:115200});
    writer = port.writable.getWriter();
    $sDot.className='status-dot on';
    setText($sTxt,'接続中 — 115200 baud');
    $connect.textContent='DISCONNECT';
    addLog('sys','—','シリアルポート接続 ✓');
    readLoop();
    updateUI();
  } catch(e){ addLog('sys','⚠','接続失敗: '+e.message); }
});

// =========================================================
// キーボード入力対応
// =========================================================
document.addEventListener('keydown', async (e) => {
  if(e.ctrlKey || e.metaKey || e.altKey) return;

  const key = e.key.toLowerCase();

  // Enter -> 送信
  if(e.key === 'Enter'){
    e.preventDefault();
    if(!writer || charCount === 0) return;
    await serialSendLine('S');
    return;
  }

  // Backspace -> リセット
  if(e.key === 'Backspace'){
    e.preventDefault();
    if(!writer || charCount === 0) return;
    await serialSendLine('R');
    step=STEP.ALPHA; alphaIdx=0; extIdx=0; finalIdx=0;
    buffer=''; charCount=0;
    updateUI();
    return;
  }

  // Escape -> 1ステップ戻る
  if(e.key === 'Escape'){
    e.preventDefault();
    if(step === STEP.EXT){ step=STEP.ALPHA; alphaIdx=0; updateUI(); }
    else if(step === STEP.FINAL){ step=STEP.EXT; updateUI(); }
    return;
  }

  if(key.length !== 1 || key < 'a' || key > 'z') return;
  e.preventDefault();

  if(step === STEP.ALPHA){
    const i = ALPHA.indexOf(key);
    if(i === -1) return;
    const avail = isVowel(i) || EXT_COUNT[i] > 0;
    if(!avail) return;
    await clickS1(i);

  } else if(step === STEP.EXT){
    let matched = null;
    for(const row of QWERTY_STEP2){
      for(const cell of row){
        if(cell.l === key || cell.l === key+'→'){
          matched = cell; break;
        }
      }
      if(matched) break;
    }
    if(!matched) return;

    const ei  = matched.e;
    const cnt = EXT_COUNT[alphaIdx];

    if(ei === 'Y'){
      const avail = cnt > 5 && (KANA[alphaIdx][5]||KANA[alphaIdx][6]||KANA[alphaIdx][7]);
      if(avail){ step3mode='ya'; step=STEP.FINAL; updateUI(); }
    } else if(ei !== null && ei !== 'SM'){
      const avail = ei < cnt && KANA[alphaIdx][ei] !== null;
      if(avail) await clickS2(ei);
    }

  } else if(step === STEP.FINAL){
    const yMap  = {a:5, u:6, o:7};
    const smMap = {a:0, i:1, u:2, e:3, o:4};
    const activeMap = step3mode==='ya' ? yMap : smMap;
    if(!(key in activeMap)) return;
    if(step3mode === 'ya') await clickS3ya(activeMap[key]);
    else await clickS3sm(activeMap[key]);
  }
});

// =========================================================
// 初期描画
// =========================================================
const bm = document.getElementById('btn-mode');
if(bm) bm.style.display='none';

updateUI();
</script>
